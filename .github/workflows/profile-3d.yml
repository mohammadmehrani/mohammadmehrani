name: GitHub-Profile-3D-Contrib

on:
  schedule:
    - cron: "0 6,18 * * *"
  workflow_dispatch:
    inputs:
      themes:
        description: 'Themes to generate (comma-separated)'
        required: false
        default: 'all'
        type: string
      notify:
        description: 'Send Telegram notification'
        required: false
        default: true
        type: boolean

concurrency:
  group: profile-3d-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v4

      - name: Cache 3D generation
        uses: actions/cache@v4
        with:
          path: profile-3d-contrib
          key: ${{ runner.os }}-3d-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-3d-

      - name: Clean old 3D graph files
        run: rm -f profile-3d-contrib/*.svg

      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: mohammadmehrani

      - name: Optimize SVGs
        run: |
          if command -v svgo &> /dev/null; then
            svgo -f profile-3d-contrib --quiet || true
          else
            echo "SVGO not available, skipping optimization"
          fi

      - name: Notify n8n via Webhook
        if: ${{ success() }}
        run: |
          curl -s -X POST "${{ secrets.N8N_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "event": "profile_3d_generated",
              "repository": "${{ github.repository }}",
              "workflow": "${{ github.workflow }}",
              "status": "success",
              "timestamp": "${{ github.event.head_commit.timestamp }}"
            }' || echo "Webhook notification skipped"

      - name: Commit & Push
        run: |
          git config user.name "mohammadmehrani"
          git config user.email "mehrani1992@gmail.com"
          git add -A .
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "generated: profile-3d-contrib [skip ci]"
          git push
