name: Latest Blog Post Workflow

on:
  workflow_dispatch:
    inputs:
      feed_url:
        description: 'Blog RSS/Atom feed URL'
        required: false
        default: 'https://iodeck.ir/rss'
      max_posts:
        description: 'Maximum number of posts to show'
        required: false
        default: '5'
        type: choice
        options:
          - '3'
          - '5'
          - '10'

jobs:
  update-readme-with-blog:
    name: Update README with latest blog posts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check feed availability
        id: check-feed
        run: |
          FEED_URL="${{ github.event.inputs.feed_url || 'https://iodeck.ir/rss' }}"
          CONTENT_TYPE=$(curl -s -o /dev/null -w "%{content_type}" "$FEED_URL" 2>/dev/null || echo "")
          if echo "$CONTENT_TYPE" | grep -qiE "xml|rss|atom|json"; then
            echo "valid=true" >> $GITHUB_OUTPUT
            echo "Feed is valid: $CONTENT_TYPE"
          else
            echo "valid=false" >> $GITHUB_OUTPUT
            echo "No RSS feed found at $FEED_URL (content-type: $CONTENT_TYPE)"
          fi

      - name: Pull in blog posts
        if: steps.check-feed.outputs.valid == 'true'
        uses: gautamkrishnar/blog-post-workflow@master
        with:
          feed_list: "${{ github.event.inputs.feed_url || 'https://iodeck.ir/rss' }}"
          max_post_count: "${{ github.event.inputs.max_posts || '5' }}"
          disable_item_validation: true
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          comment_tag_name: "BLOG-POST-LIST"

      - name: Check for changes
        id: check-changes
        run: |
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Notify n8n on new blog posts
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          curl -s -X POST "${{ secrets.N8N_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "event": "blog_posts_updated",
              "repository": "${{ github.repository }}",
              "feed": "${{ github.event.inputs.feed_url || 'https://iodeck.ir/rss' }}",
              "timestamp": "${{ github.event.repository.updated_at }}"
            }' || echo "Webhook notification skipped"
