name: GitHub-3D-Profile-Xarthurx

on:
  schedule:
    - cron: "30 6,18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-xarthurx-themes
    steps:
      - uses: actions/checkout@v5
      - uses: xarthurx/github-3d-profile@v1.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          SETTING_JSON: settings/theme-preview.json
      - name: Commit & Push
        run: |
          git config user.name "maddixmhn"
          git config user.email "mehrani1992@gmail.com"
          git add -A .
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "generated: xarthurx-3d-contrib [skip ci]"
          git pull --rebase
          git push
