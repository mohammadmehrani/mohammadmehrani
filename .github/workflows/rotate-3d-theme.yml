name: Rotate 3D Theme

on:
  schedule:
    - cron: "15 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Rotate bottom 3D theme
        run: |
          THEMES=("nord-light" "nord-dark" "solarized-light" "solarized-dark" "gruvbox-light" "gruvbox-dark" "rose-pine-light" "rose-pine-dark" "graphite-light" "graphite-dark")
          DAY=$(date +%j)
          INDEX=$((10#$DAY % 10))
          THEME="${THEMES[$INDEX]}"
          echo "Day $DAY → Index $INDEX → Theme: $THEME"
          sed -i 's|src="./profile-3d-contrib/[^"]*" alt="3D contribution graph green"|src="./profile-3d-contrib/'"$THEME"'.svg" alt="3D contribution graph"|' README.md
          echo "Updated README to $THEME"

      - name: Commit & Push
        run: |
          git config user.name "maddixmhn"
          git config user.email "mehrani1992@gmail.com"
          git add -A .
          if git diff --staged --quiet; then
            echo "No theme change today"
            exit 0
          fi
          git commit -m "rotate: 3D theme [skip ci]"
          git pull --rebase
          git push
